<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mockup LiftCloud - Detalles</title>
<style>
  body {
    background-color: #222;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    font-family: 'Segoe UI', sans-serif; /* Fuente tipo reloj */
  }

  .watch-case {
    width: 388px;
    height: 468px;
    background: #111;
    border-radius: 40px;
    padding: 10px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
    border: 2px solid #333;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .screen {
    width: 368px;
    height: 448px;
    background-color: #000000;
    border-radius: 30px;
    position: relative;
    overflow: hidden;
    color: white;
  }

  /* Títulos de Columnas */
  .headers {
    display: flex;
    position: absolute;
    top: 10px;
    width: 100%;
    height: 40px;
    z-index: 20;
  }
  .header {
    width: 50%;
    text-align: center;
    font-size: 20px;
    color: #888;
    text-transform: uppercase;
    font-weight: bold;
    line-height: 40px;
  }

  /* Contenedor del Picker Doble */
  .picker-wrapper {
    display: flex;
    position: absolute;
    top: 50px;
    width: 100%;
    height: 290px;
    /* Máscara de desvanecimiento */
    mask-image: linear-gradient(to bottom, transparent, black 20%, black 80%, transparent);
    -webkit-mask-image: linear-gradient(to bottom, transparent, transparent 5%, black 25%, black 75%, transparent 95%, transparent);
  }

  .picker-col {
    width: 50%;
    height: 100%;
    overflow-y: scroll;
    scrollbar-width: none;
    -ms-overflow-style: none;
    scroll-snap-type: y mandatory;
    text-align: center;
    border-right: 1px solid #222; /* Separador sutil */
  }
  .picker-col::-webkit-scrollbar { display: none; }

  .picker-item {
    height: 58px; /* 290 / 5 items */
    display: flex;
    justify-content: center;
    align-items: center;
    scroll-snap-align: center;
  }

  /* ESTILO FIJO (No cambia tamaño, solo color) */
  .picker-item span {
    font-size: 32px; /* Tamaño grande y legible fijo */
    color: #666;     /* Color apagado */
    font-weight: normal;
    transition: color 0.2s;
  }

  .picker-item.active span {
    color: #00AAFF;  /* Color encendido */
    font-weight: bold;
    /* font-size se mantiene en 32px */
  }
  
  /* Unidades pequeñas al lado */
  .unit { font-size: 16px; margin-left: 4px; color: #444; }
  .active .unit { color: #00AAFF; }

  /* Líneas de selección */
  .selection-lines {
    position: absolute;
    top: 166px; /* (50 + 290/2) - 29 */
    left: 0;
    width: 100%;
    height: 58px;
    border-top: 1px solid #333;
    border-bottom: 1px solid #333;
    pointer-events: none;
    z-index: 5;
  }

  /* Botones Inferiores */
  .btn-container {
    position: absolute;
    bottom: 20px;
    width: 100%;
    display: flex;
    justify-content: space-evenly;
  }

  .btn {
    height: 60px;
    border-radius: 16px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
    font-size: 24px;
    cursor: pointer;
  }

  .btn-back {
    width: 100px;
    background-color: #333;
    color: #fff;
  }

  .btn-save {
    width: 220px;
    background-color: #00AAFF;
    color: #000;
  }

</style>
</head>
<body>

<div class="watch-case">
  <div class="screen">
    
    <div class="headers">
      <div class="header">KG</div>
      <div class="header">REPS</div>
    </div>

    <div class="selection-lines"></div>

    <div class="picker-wrapper">
      <!-- Columna PESO -->
      <div class="picker-col" id="col1">
        <div style="height: 116px;"></div>
        <div class="picker-item"><span>9.25</span></div>
        <div class="picker-item"><span>9.50</span></div>
        <div class="picker-item"><span>9.75</span></div>
        <div class="picker-item active"><span>10.00</span></div>
        <div class="picker-item"><span>10.25</span></div>
        <div class="picker-item"><span>10.50</span></div>
        <div class="picker-item"><span>10.75</span></div>
        <div style="height: 116px;"></div>
      </div>

      <!-- Columna REPS -->
      <div class="picker-col" id="col2">
        <div style="height: 116px;"></div>
        <div class="picker-item"><span>8</span></div>
        <div class="picker-item"><span>9</span></div>
        <div class="picker-item active"><span>10</span></div>
        <div class="picker-item"><span>11</span></div>
        <div class="picker-item"><span>12</span></div>
        <div class="picker-item"><span>13</span></div>
        <div class="picker-item"><span>14</span></div>
        <div style="height: 116px;"></div>
      </div>
    </div>

    <div class="btn-container">
      <div class="btn btn-back">←</div>
      <div class="btn btn-save">LOG SET</div>
    </div>

  </div>
</div>

</body>
</html>
